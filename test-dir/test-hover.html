<!DOCTYPE html>
<html>
<head>
  <style>
    .test-box {
      padding: 10px 20px;
      margin: 5px;
      border: 1px solid red;
      border-radius: 4px;
      background: var(--bg-color);
    }
    .test-box:hover {
      background: blue;
      border-color: green;
    }
    .parent .child {
      padding: 1rem;
    }
    .parent .child:hover {
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="test-box">Box</div>
  <div class="parent">
    <div class="child">Child</div>
  </div>
</body>
</html>
